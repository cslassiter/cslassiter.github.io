<script>
(function(){
  "use strict";
  if(!(window.crypto && crypto.subtle)){ document.getElementById('nocrypto').hidden=false; return; }
  var blob = JSON.parse(document.getElementById('payload').textContent);
  var KEYNAME = 'formal_logic_pass';
  function b64(s){ var bin=atob(s), a=new Uint8Array(bin.length); for(var i=0;i<bin.length;i++){ a[i]=bin.charCodeAt(i);} return a; }
  function render(text){ document.open(); document.write(text); document.close(); }
  function decryptWith(pass){
    var enc=new TextEncoder();
    return crypto.subtle.importKey('raw', enc.encode(pass), {name:'PBKDF2'}, false, ['deriveKey'])
      .then(function(km){
        return crypto.subtle.deriveKey(
          {name:'PBKDF2', salt:b64(blob.salt), iterations:blob.iters, hash:'SHA-256'},
          km, {name:'AES-GCM', length:256}, false, ['decrypt']);
      })
      .then(function(key){
        return crypto.subtle.decrypt({name:'AES-GCM', iv:b64(blob.iv)}, key, b64(blob.ct));
      })
      .then(function(buf){ return new TextDecoder('utf-8').decode(buf); });
  }
  function attempt(pass, fromStorage){
    decryptWith(pass).then(function(text){
      try{ sessionStorage.setItem(KEYNAME, pass); }catch(e){}
      render(text);
    }).catch(function(){
      if(fromStorage){ try{ sessionStorage.removeItem(KEYNAME); }catch(e){} return; }
      var el=document.getElementById('err'); if(el){ el.hidden=false; }
      var p=document.getElementById('pass'); if(p){ p.value=''; p.focus(); }
    });
  }
  document.getElementById('gform').addEventListener('submit', function(ev){
    ev.preventDefault(); attempt(document.getElementById('pass').value, false);
  });
  var saved=null; try{ saved=sessionStorage.getItem(KEYNAME); }catch(e){}
  if(saved){ attempt(saved, true); }
})();
</script>
